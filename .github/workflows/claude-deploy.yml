name: Claude Deploy

on:
  repository_dispatch:
    types: [claude-update]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write updated file
        run: |
          FILE="${{ github.event.client_payload.file }}"
          mkdir -p "$(dirname "$FILE")"
          echo "${{ github.event.client_payload.content }}" | base64 --decode > "$FILE"
          echo "✓ Wrote: $FILE"

      - name: Commit and push
        run: |
          git config user.name "Claude Deploy Bot"
          git config user.email "claude-bot@isowatt.shop"
          git add .
          git commit -m "${{ github.event.client_payload.message }}"
          git push origin main
