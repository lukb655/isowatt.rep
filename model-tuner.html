<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IsoWatt 3D Model Tuner</title>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #0a0a0a;
color: #e0e0e0;
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
padding: 20px;
}
.container {
display: grid;
grid-template-columns: 1fr 350px;
gap: 20px;
max-width: 1400px;
margin: 0 auto;
}
canvas {
display: block;
width: 100%;
height: 600px;
border: 1px solid #333;
border-radius: 8px;
background: #161616;
}
.controls {
background: #1a1a1a;
border: 1px solid #333;
border-radius: 8px;
padding: 20px;
height: fit-content;
}
.control-group {
margin-bottom: 20px;
}
label {
display: block;
font-size: 12px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.05em;
color: #888;
margin-bottom: 8px;
}
input[type="range"] {
width: 100%;
height: 6px;
border-radius: 3px;
background: #333;
outline: none;
-webkit-appearance: none;
}
input[type="range"]::-webkit-slider-thumb {
-webkit-appearance: none;
appearance: none;
width: 16px;
height: 16px;
border-radius: 50%;
background: #F0A500;
cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
width: 16px;
height: 16px;
border-radius: 50%;
background: #F0A500;
cursor: pointer;
border: none;
}
.value-display {
display: inline-block;
background: #222;
padding: 4px 8px;
border-radius: 3px;
font-size: 11px;
color: #F0A500;
font-family: 'Courier New', monospace;
margin-left: 8px;
}
.model-select {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-bottom: 20px;
}
.model-btn {
padding: 8px;
background: #222;
border: 1px solid #333;
border-radius: 4px;
color: #e0e0e0;
cursor: pointer;
font-size: 12px;
transition: all 0.2s;
}
.model-btn:hover {
border-color: #555;
}
.model-btn.active {
background: #F0A500;
border-color: #F0A500;
color: #000;
}
button {
width: 100%;
padding: 10px;
background: #F0A500;
color: #000;
border: none;
border-radius: 4px;
font-weight: 600;
cursor: pointer;
margin-top: 10px;
}
button:hover {
background: #f0b520;
}
.info {
font-size: 11px;
color: #666;
margin-top: 15px;
padding-top: 15px;
border-top: 1px solid #333;
line-height: 1.5;
}
</style>
</head>
<body>

<div class="container">
<canvas id="canvas"></canvas>

<div class="controls">
<div class="model-select">
<button class="model-btn active" onclick="switchModel('iso-station')">IsoStation</button>
<button class="model-btn" onclick="switchModel('iso-station-plus')">IsoStation+</button>
<button class="model-btn" onclick="switchModel('iso-point')">IsoPoint</button>
<button class="model-btn" onclick="switchModel('iso-point-plus')">IsoPoint+</button>
</div>

<div class="control-group">
<label>Camera X <span class="value-display" id="camX-val">2</span></label>
<input type="range" id="camX" min="-5" max="5" step="0.1" value="2" oninput="updateControls()">
</div>

<div class="control-group">
<label>Camera Y <span class="value-display" id="camY-val">2</span></label>
<input type="range" id="camY" min="-5" max="8" step="0.1" value="2" oninput="updateControls()">
</div>

<div class="control-group">
<label>Camera Z <span class="value-display" id="camZ-val">5</span></label>
<input type="range" id="camZ" min="1" max="10" step="0.1" value="5" oninput="updateControls()">
</div>

<div class="control-group">
<label>Rotation Angle <span class="value-display" id="angle-val">0°</span></label>
<input type="range" id="angle" min="0" max="360" step="1" value="0" oninput="updateControls()">
</div>

<button onclick="exportSettings()">Copy Settings</button>

<div class="info">
Drag on canvas to rotate.
Adjust sliders to fine-tune camera position.
</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
let W = canvas.clientWidth;
let H = canvas.clientHeight;

let scene, camera, renderer, model;
let currentModel = 'iso-station';

const MODEL_CONFIGS = {
'iso-station': { file: 'models/4800_Case_Open.glb', scale: 0.004300, px: 0.0, py: 0.0, pz: 0.0, rotX: -1.282817, rotY: 0.0, rotZ: 0.0, camZ: 5.0, label: 'Apache 4800 · IsoStation' },
'iso-station-plus': { file: 'models/4800_Case_Open.glb', scale: 0.004300, px: 0.0, py: 0.0, pz: 0.0, rotX: -1.282817, rotY: 0.0, rotZ: 0.0, camZ: 5.0, label: 'Apache 4800 · IsoStation+' },
'iso-point': { file: 'models/model.glb', scale: 0.004300, px: 0.0, py: 0.0, pz: 0.0, rotX: -1.282817, rotY: 0.0, rotZ: 0.0, camZ: 2.7, label: 'Apache 2800 · IsoPoint' },
'iso-point-plus': { file: 'models/model.glb', scale: 0.004300, px: 0.0, py: 0.0, pz: 0.0, rotX: -1.282817, rotY: 0.0, rotZ: 0.0, camZ: 2.7, label: 'Apache 2800 · IsoPoint+' }
};

const orbit = {
active: false,
lastX: 0,
angle: 0,
camZ: 5.0,
camX: 2,
camY: 2
};

function init3D() {
scene = new THREE.Scene();
scene.background = new THREE.Color(0x161616);

camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 1000);
updateCameraPosition();

renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(W, H);

const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(5, 10, 7);
scene.add(light);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

canvas.addEventListener('mousedown', (e) => {
orbit.active = true;
orbit.lastX = e.clientX;
});
canvas.addEventListener('mousemove', (e) => {
if (!orbit.active) return;
const dx = (e.clientX - orbit.lastX) * 0.5;
orbit.angle += dx;
orbit.lastX = e.clientX;
updateCameraPosition();
updateControls();
});
canvas.addEventListener('mouseup', () => { orbit.active = false; });

canvas.addEventListener('wheel', (e) => { e.preventDefault(); }, { passive: false });

loadModel('iso-station');
animate();
}

function updateCameraPosition() {
if (!camera) return;
const originalX = orbit.camX;
const originalZ = orbit.camZ;
const radius = Math.sqrt(originalX * originalX + originalZ * originalZ);
const baseAngle = Math.atan2(originalX, originalZ);
const angle = (orbit.angle * Math.PI / 180) + baseAngle;

const x = Math.sin(angle) * radius;
const y = orbit.camY;
const z = Math.cos(angle) * radius;
camera.position.set(x, y, z);
camera.lookAt(0, 0, 0);
}

function loadModel(key) {
currentModel = key;
const config = MODEL_CONFIGS[key];
orbit.camZ = config.camZ;
orbit.angle = 0;
document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
event.target.classList.add('active');
if (model) scene.remove(model);
const geometry = new THREE.BoxGeometry(1, 1, 1);
const material = new THREE.MeshStandardMaterial({ color: 0x444 });
model = new THREE.Mesh(geometry, material);
model.scale.set(config.scale * 1000, config.scale * 1000, config.scale * 1000);
model.position.set(config.px, config.py, config.pz);
model.rotation.order = 'XYZ';
model.rotation.x = config.rotX;
model.rotation.y = config.rotY;
model.rotation.z = config.rotZ;
scene.add(model);
updateCameraPosition();
updateControls();
}

function updateControls() {
orbit.camX = parseFloat(document.getElementById('camX').value);
orbit.camY = parseFloat(document.getElementById('camY').value);
orbit.camZ = parseFloat(document.getElementById('camZ').value);

document.getElementById('camX-val').textContent = orbit.camX.toFixed(1);
document.getElementById('camY-val').textContent = orbit.camY.toFixed(1);
document.getElementById('camZ-val').textContent = orbit.camZ.toFixed(1);
document.getElementById('angle-val').textContent = Math.round(orbit.angle) + '°';

updateCameraPosition();
}

function animate() {
requestAnimationFrame(animate);
renderer.render(scene, camera);
}

function switchModel(key) {
currentModel = key;
const config = MODEL_CONFIGS[key];
orbit.camZ = config.camZ;
orbit.angle = 0;
document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('camZ').value = config.camZ;
updateControls();
}

function exportSettings() {
const settings = {
camX: orbit.camX,
camY: orbit.camY,
camZ: orbit.camZ,
angle: orbit.angle
};
const json = JSON.stringify(settings, null, 2);
navigator.clipboard.writeText(json).then(() => {
alert('Settings copied to clipboard:\n' + json);
}).catch(() => {
alert('Could not copy. Settings:\n' + json);
});
}

window.addEventListener('resize', () => {
W = canvas.clientWidth;
H = canvas.clientHeight;
camera.aspect = W / H;
camera.updateProjectionMatrix();
renderer.setSize(W, H);
});

init3D();
</script>

</body>
</html>
